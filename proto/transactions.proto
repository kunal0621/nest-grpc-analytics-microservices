syntax = "proto3";

package transaction.v1;

service TransactionService {
  rpc Ping (PingRequest) returns (PingResponse) {}
  rpc RecordTransaction (RecordTransactionRequest) returns (RecordTransactionResponse) {}
  rpc GetTransactionsByAccount (GetTransactionsByAccountRequest) returns (GetTransactionsByAccountResponse) {}
  rpc GetTransactionsBySymbol (GetTransactionsBySymbolRequest) returns (GetTransactionsBySymbolResponse) {}
  rpc GetTransactionBucketSummary (GetTransactionBucketSummaryRequest) returns (GetTransactionBucketSummaryResponse) {}
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message RecordTransactionRequest {
  int32 account_id = 1;
  string symbol = 2;
  int32 amount = 3;
  string price = 4;
  string transaction_code = 5;
}

message RecordTransactionResponse {
  bool success = 1;
  string bucket_id = 2;
}

message Transaction {
  string date = 1;
  int32 amount = 2;
  string transaction_code = 3;
  string symbol = 4;
  string price = 5;
  string total = 6;
}

message TransactionBucket {
  int32 account_id = 1;
  int32 transaction_count = 2;
  string bucket_start_date = 3;
  string bucket_end_date = 4;
  repeated Transaction transactions = 5;
}

message GetTransactionsByAccountRequest {
  int32 account_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message GetTransactionsByAccountResponse {
  repeated TransactionBucket buckets = 1;
}

message GetTransactionsBySymbolRequest {
  int32 account_id = 1;
  string symbol = 2;
}

message GetTransactionsBySymbolResponse {
  repeated TransactionBucket buckets = 1;
}

message DateRange {
  string earliest = 1;
  string latest = 2;
}

message GetTransactionBucketSummaryRequest {
  int32 account_id = 1;
}

message GetTransactionBucketSummaryResponse {
  int32 account_id = 1;
  int32 total_buckets = 2;
  int32 total_transactions = 3;
  DateRange date_range = 4;
}
