syntax = "proto3";

package account.v1;

service AccountService {
  rpc Ping (PingRequest) returns (PingResponse) {}
  rpc GetAccounts (GetAccountsRequest) returns (GetAccountsResponse) {}
  rpc CreateAccount (CreateAccountRequest) returns (CreateAccountResponse) {}
  rpc GetAccountById (GetAccountByIdRequest) returns (GetAccountByIdResponse) {}
  rpc UpdateAccountLimit (UpdateAccountLimitRequest) returns (UpdateAccountLimitResponse) {}
  rpc AddProductToAccount (AddProductToAccountRequest) returns (AddProductToAccountResponse) {}
  rpc RemoveProductFromAccount (RemoveProductFromAccountRequest) returns (RemoveProductFromAccountResponse) {}
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message GetAccountsRequest {
  int32 limit = 1;
}

message Account {
  int32 account_id = 1;
  int32 limit      = 2;
  repeated string products = 3;
}

message GetAccountsResponse {
  repeated Account accounts = 1;
}

message CreateAccountRequest {
  int32 account_id = 1;
  int32 limit = 2;
  repeated string products = 3;
}

message CreateAccountResponse {
  Account account = 1;
}

message GetAccountByIdRequest {
  int32 account_id = 1;
}

message GetAccountByIdResponse {
  Account account = 1;
}

message UpdateAccountLimitRequest {
  int32 account_id = 1;
  int32 new_limit = 2;
}

message UpdateAccountLimitResponse {
  Account account = 1;
}

message AddProductToAccountRequest {
  int32 account_id = 1;
  string product = 2;
}

message AddProductToAccountResponse {
  Account account = 1;
}

message RemoveProductFromAccountRequest {
  int32 account_id = 1;
  string product = 2;
}

message RemoveProductFromAccountResponse {
  Account account = 1;
}
